name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: "Tests · ${{ matrix.os }} · PHP ${{ matrix.php }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        php: ['8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run Pest
        shell: bash
        run: vendor/bin/pest --colors=always

  tests-jit:
    name: "Tests · JIT function mode"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP with JIT (function mode)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: opcache
          ini-values: >-
            opcache.enable_cli=1,
            opcache.jit_buffer_size=64M,
            opcache.jit=function

      - name: Verify JIT is active
        run: |
          php -r 'exit((opcache_get_status(false)["jit"]["on"] ?? false) ? 0 : 1);' \
            || (echo "JIT is not active!" && php -r 'print_r(opcache_get_status(false)["jit"] ?? "no jit info");' && exit 1)
          echo "JIT is active."

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run Pest with JIT
        run: vendor/bin/pest --colors=always

  phpstan:
    name: "PHPStan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  lint:
    name: "PHP CS Fixer"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --show-progress=none
